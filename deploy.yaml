# ---------------------------------------------------------
# 1. Persistent Volume Claim (PVC)
# ---------------------------------------------------------
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
# ---------------------------------------------------------
# 2. Database Initialization Script (ConfigMap)
# ---------------------------------------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-script
data:
  init.sql: |
    CREATE TABLE IF NOT EXISTS users (
        id SERIAL PRIMARY KEY,
        name VARCHAR(100) NOT NULL,
        email VARCHAR(100) UNIQUE NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS calendars (
        id SERIAL PRIMARY KEY,
        user_id INT REFERENCES users(id) ON DELETE CASCADE,
        name VARCHAR(100) NOT NULL,
        description TEXT,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS events (
        id SERIAL PRIMARY KEY,
        calendar_id INT REFERENCES calendars(id) ON DELETE CASCADE,
        title VARCHAR(255) NOT NULL,
        description TEXT,
        start_time TIMESTAMP NOT NULL,
        end_time TIMESTAMP NOT NULL,
        location VARCHAR(255),
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    CREATE TABLE IF NOT EXISTS calendar_shares (
        id SERIAL PRIMARY KEY,
        calendar_id INT REFERENCES calendars(id) ON DELETE CASCADE,
        user_id INT REFERENCES users(id) ON DELETE CASCADE,
        permission VARCHAR(50) NOT NULL,
        created_at TIMESTAMP DEFAULT CURRENT_TIMESTAMP
    );

    INSERT INTO users (name, email) VALUES ('John Doe', 'john@example.com') ON CONFLICT DO NOTHING;
    INSERT INTO calendars (user_id, name) VALUES (1, 'Work') ON CONFLICT DO NOTHING;
    INSERT INTO events (calendar_id, title, start_time, end_time)
    VALUES (1, 'Initial Event', '2026-03-01 10:00:00', '2026-03-01 12:00:00');

---
# ---------------------------------------------------------
# 3. Database Credentials (Secret)
# ---------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: calendar-db-secret
type: Opaque
data:
  db-password: cGFzc3dvcmQ= # Plaintext is: password

---
# ---------------------------------------------------------
# 4. Node.js API Service
# ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calendar-api
  template:
    metadata:
      labels:
        app: calendar-api
    spec:
      containers:
        - name: api
          image: nodejs-image-v1
          imagePullPolicy: IfNotPresent # Forces the use of the local image within Minikube
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "calendar-db-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: calendar-db-secret
                  key: db-password
            - name: DB_NAME
              value: "calendardb"
            - name: REDIS_HOST
              value: "calendar-redis-service"
            - name: REDIS_PORT
              value: "6379"

---
apiVersion: v1
kind: Service
metadata:
  name: calendar-api-service
spec:
  selector:
    app: calendar-api
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000

---
# ---------------------------------------------------------
# 5. PostgreSQL Database
# ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calendar-db
  template:
    metadata:
      labels:
        app: calendar-db
    spec:
      containers:
        - name: db
          image: postgres:17
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "user"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: calendar-db-secret
                  key: db-password
            - name: POSTGRES_DB
              value: "calendardb"
          volumeMounts:
            - name: db-storage
              mountPath: /var/lib/postgresql/data
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d/init.sql
              subPath: init.sql
      volumes:
        - name: db-storage
          persistentVolumeClaim:
            claimName: db-pvc
        - name: init-script
          configMap:
            name: postgres-init-script

---
apiVersion: v1
kind: Service
metadata:
  name: calendar-db-service
spec:
  selector:
    app: calendar-db
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432

---
# ---------------------------------------------------------
# 6. Redis Service
# ---------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calendar-redis
  template:
    metadata:
      labels:
        app: calendar-redis
    spec:
      containers:
        - name: redis
          image: redis:latest
          ports:
            - containerPort: 6379

---
apiVersion: v1
kind: Service
metadata:
  name: calendar-redis-service
spec:
  selector:
    app: calendar-redis
  ports:
    - protocol: TCP
      port: 6379
      targetPort: 6379
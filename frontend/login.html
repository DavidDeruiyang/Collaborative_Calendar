<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 18px 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .message {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .hint {
      margin-top: 14px;
      color: #6b7280;
      font-size: 13px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <div id="message" class="message"></div>

    <div class="hint">
      Use existing account.<br>
      No account yet? <a href="/register.html">Register</a>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "token";
    const CALENDAR_KEY = "selectedCalendarId";

    function getToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function setToken(token) {
      sessionStorage.setItem(TOKEN_KEY, token);
    }

    function clearToken() {
      sessionStorage.removeItem(TOKEN_KEY);
    }

    function getSelectedCalendarId() {
      return sessionStorage.getItem(CALENDAR_KEY);
    }

    function setSelectedCalendarId(calendarId) {
      sessionStorage.setItem(CALENDAR_KEY, String(calendarId));
    }

    function clearSelectedCalendarId() {
      sessionStorage.removeItem(CALENDAR_KEY);
    }

    function showMessage(text, type) {
      const box = document.getElementById("message");
      box.textContent = text;
      box.className = `message ${type}`;
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        showMessage("Email and password are required.", "error");
        return;
      }

      const res = await fetch("/auth/login", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.error || "Login failed.", "error");
        return;
      }

      setToken(data.token);
      clearSelectedCalendarId();

      showMessage("Login successful.", "success");

      setTimeout(() => {
        window.location.href = "/homepage.html";
      }, 500);
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Calendar Home</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      padding: 32px;
      color: #111827;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    h1, h2 {
      margin: 0 0 14px 0;
    }

    .section-label {
      font-size: 13px;
      font-weight: 700;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 10px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    input, textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
      background: white;
    }

    textarea {
      min-height: 90px;
      resize: vertical;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
    }

    .primary-btn {
      background: #2563eb;
      color: white;
    }

    .secondary-btn {
      background: #e5e7eb;
      color: #111827;
    }

    .message {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .calendar-item {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
    }

    .calendar-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .calendar-info {
      color: #374151;
      line-height: 1.5;
      margin-bottom: 12px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      background: #dbeafe;
      color: #1d4ed8;
      margin-bottom: 10px;
    }

    .empty {
      color: #6b7280;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="top-bar">
        <div>
          <h1>Calendar Home</h1>
          <div id="userInfo" style="color:#6b7280;">Loading user...</div>
        </div>
        <button class="secondary-btn" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="card">
      <div class="section-label">Create Calendar</div>

      <div class="form-grid">
        <input id="calendar_name" placeholder="Calendar name">
      </div>

      <div style="margin-top:12px;">
        <textarea id="calendar_description" placeholder="Description (optional)"></textarea>
      </div>

      <div class="actions">
        <button class="primary-btn" onclick="createCalendar()">Create Calendar</button>
        <button class="secondary-btn" onclick="loadCalendars()">Refresh</button>
      </div>

      <div id="homeMessage" class="message"></div>
    </div>

    <div class="card">
      <div class="section-label">My Calendars</div>
      <div id="calendarList" class="calendar-grid"></div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem("token");

    if (!token) {
      window.location.href = "/login.html";
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("selectedCalendarId");
      window.location.href = "/login.html";
    }

    function showMessage(text, type = "success") {
      const box = document.getElementById("homeMessage");
      box.textContent = text;
      box.className = `message ${type}`;
      setTimeout(() => {
        box.className = "message";
        box.textContent = "";
      }, 3000);
    }

    function escapeHtml(text) {
      return (text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadMe() {
      const res = await fetch("/me", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.error || "Failed to load user");
      }

      document.getElementById("userInfo").textContent =
        `${data.name} (${data.email})`;
    }

    async function loadCalendars() {
      const res = await fetch("/calendars", {
        headers: {
          "Authorization": "Bearer " + token
        }
      });

      const data = await res.json();
      const list = document.getElementById("calendarList");
      list.innerHTML = "";

      if (!res.ok) {
        showMessage(data.error || "Failed to load calendars.", "error");
        return;
      }

      if (!Array.isArray(data) || data.length === 0) {
        list.innerHTML = `<div class="empty">No calendars yet. Create your first one.</div>`;
        return;
      }

      data.forEach(calendar => {
        const div = document.createElement("div");
        div.className = "calendar-item";
        div.innerHTML = `
          <div class="badge">${escapeHtml(calendar.role)}</div>
          <div class="calendar-name">${escapeHtml(calendar.name)}</div>
          <div class="calendar-info">
            <div><strong>Description:</strong> ${escapeHtml(calendar.description || "No description")}</div>
            <div><strong>Calendar ID:</strong> ${calendar.id}</div>
          </div>
          <div class="actions">
            <button class="primary-btn" onclick="openCalendar(${calendar.id})">Open Calendar</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    async function createCalendar() {
      const name = document.getElementById("calendar_name").value.trim();
      const description = document.getElementById("calendar_description").value.trim();

      if (!name) {
        showMessage("Calendar name is required.", "error");
        return;
      }

      const res = await fetch("/calendars", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({
          name,
          description
        })
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.error || "Failed to create calendar.", "error");
        return;
      }

      document.getElementById("calendar_name").value = "";
      document.getElementById("calendar_description").value = "";

      showMessage("Calendar created.");
      loadCalendars();
    }

    function openCalendar(calendarId) {
      localStorage.setItem("selectedCalendarId", String(calendarId));
      window.location.href = "/index.html";
    }

    async function initPage() {
      try {
        await loadMe();
        await loadCalendars();
      } catch (err) {
        console.error(err);
        showMessage(err.message || "Initialization failed.", "error");
      }
    }

    initPage();
  </script>
</body>
</html>

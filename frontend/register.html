<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #111827;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin: 0 0 18px 0;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }

    .message {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .message.error {
      background: #fee2e2;
      color: #991b1b;
      display: block;
    }

    .message.success {
      background: #dcfce7;
      color: #166534;
      display: block;
    }

    .hint {
      margin-top: 14px;
      color: #6b7280;
      font-size: 13px;
      text-align: center;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Register</h1>

    <input id="name" placeholder="Name">
    <input id="email" type="email" placeholder="Email">

    <input id="password" type="password" placeholder="Password">
    <input id="confirm_password" type="password" placeholder="Confirm Password">

    <label style="display:flex; align-items:center; gap:6px; font-size:13px; margin-bottom:12px;">
    <input type="checkbox" onclick="togglePassword()"> Show Password
    </label>
    <button onclick="register()">Register</button>

    <div id="message" class="message"></div>

    <div class="hint">
      Already have an account?
      <a href="/login.html">Login</a>
    </div>
  </div>

  <script>
    const TOKEN_KEY = "token";
    const CALENDAR_KEY = "selectedCalendarId";

    function getToken() {
      return sessionStorage.getItem(TOKEN_KEY);
    }

    function setToken(token) {
      sessionStorage.setItem(TOKEN_KEY, token);
    }

    function clearToken() {
      sessionStorage.removeItem(TOKEN_KEY);
    }

    function getSelectedCalendarId() {
      return sessionStorage.getItem(CALENDAR_KEY);
    }

    function setSelectedCalendarId(calendarId) {
      sessionStorage.setItem(CALENDAR_KEY, String(calendarId));
    }

    function clearSelectedCalendarId() {
      sessionStorage.removeItem(CALENDAR_KEY);
    }

    function showMessage(text, type) {
      const box = document.getElementById("message");
      box.textContent = text;
      box.className = `message ${type}`;
    }
    function togglePassword() {
        const pwd = document.getElementById("password");
        const confirm = document.getElementById("confirm_password");

        const type = pwd.type === "password" ? "text" : "password";
        pwd.type = type;
        confirm.type = type;
    }

    async function register() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const confirmPassword = document.getElementById("confirm_password").value.trim();

      if (!name || !email || !password || !confirmPassword) {
        showMessage("All fields are required.", "error");
        return;
      }

      if (password !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      } 

      if (!name || !email || !password) {
        showMessage("Name, email, and password are required.", "error");
        return;
      }

      const res = await fetch("/auth/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, email, password })
      });

      const data = await res.json();

      if (!res.ok) {
        showMessage(data.error || "Registration failed.", "error");
        return;
      }

      setToken(data.token);
      clearSelectedCalendarId();
      showMessage("Registration successful.", "success");

      setTimeout(() => {
        window.location.href = "/homepage.html";
      }, 500);
    }
  </script>
</body>
</html>

apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-redis-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: calendar-redis
  template:
    metadata:
      labels:
        app: calendar-redis
    spec:
      containers:
        - name: calendar-redis
          image: redis:latest
          ports:
            - containerPort: 6379
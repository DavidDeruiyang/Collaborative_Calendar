apiVersion: apps/v1
kind: Deployment
metadata:
  name: calendar-api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calendar-api
  template:
    metadata:
      labels:
        app: calendar-api
    spec:
      containers:
        - name: calendar-api
          image: nodejs-image-v1
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: "calendar-db-service"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "user"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: calendar-db-secret
                  key: db-password
            - name: DB_NAME
              value: "calendardb"
            - name: REDIS_HOST
              value: "calendar-redis-service"
            - name: REDIS_PORT
              value: "6379"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: calendar-api-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /stats
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /stats
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 20